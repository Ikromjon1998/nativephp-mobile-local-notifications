<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bell-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Bell body -->
  <g filter="url(#shadow)">
    <!-- Main bell shape -->
    <path d="M256 108c-66 0-108 42-108 108v56c0 12-8 28-20 40-10 10-16 18-16 28 0 14 12 24 28 24h232c16 0 28-10 28-24 0-10-6-18-16-28-12-12-20-28-20-40v-56c0-66-42-108-108-108z" fill="url(#bell-grad)"/>

    <!-- Bell clapper (bottom) -->
    <ellipse cx="256" cy="388" rx="32" ry="16" fill="url(#bell-grad)"/>

    <!-- Notification dot -->
    <circle cx="340" cy="164" r="40" fill="#f43f5e"/>
    <circle cx="340" cy="164" r="28" fill="#fb7185" opacity="0.6"/>
  </g>
</svg>
